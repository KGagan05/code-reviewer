<!DOCTYPE html>
<html>

<head>
    <title>AI Code Reviewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>🤖 AI Code Reviewer</h1>

        <form action="/review" method="post">
            <textarea name="code" placeholder="Paste your code here..." required>{{code}}</textarea>
            <button type="submit">Review Code</button>
        </form>

        {% if review %}
        <div class="output">
            <h3>🧠 Review:</h3>
            <pre>{{ review }}</pre>
        </div>
        {% endif %}
    </div>
</body>

</html>
